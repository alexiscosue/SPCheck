<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPCheck — HR Employees</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/logo.png') }}">
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SPC Logo">
    <div style="display:flex;flex-direction:column">
      <div class="title">SPCheck</div>
      <div style="font-size:12px;color:var(--muted)">HR Panel</div>
    </div>
  </div>
    <nav class="menu" aria-label="Main menu">
      <a href="{{ url_for('hr_dashboard') }}"><i class='bx bx-grid-alt'></i><span>Dashboard</span></a>
      <a href="{{ url_for('hr_employees') }}" class="active"><i class='bx bx-user'></i><span>Employees</span></a>
      <a href="{{ url_for('hr_evaluations') }}"><i class='bx bx-bar-chart'></i><span>Evaluations</span></a>
      <a href="{{ url_for('hr_attendance') }}"><i class='bx bx-calendar-check'></i><span>Attendance</span></a>
      <a href="{{ url_for('hr_promotions') }}"><i class='bx bx-award'></i><span>Promotions</span></a>
      <a href="{{ url_for('hr_settings') }}"><i class='bx bx-cog'></i><span>Settings</span></a>

      <div class="bottom">
        <a href="{{ url_for('login') }}" style="color:#b91c1c"><i class='bx bx-log-out'></i><span>Logout</span></a>
      </div>
    </nav>
</aside>

<div class="main">
  <div class="topbar">
    <button class="toggle" id="btnToggle"><i class='bx bx-menu'></i></button>
    <h2 style="margin-left:12px;font-weight:800">Employee Directory</h2>
    <div class="actions" style="margin-left:auto">
        <div class="notif" title="Notifications" aria-live="polite">
          <i class='bx bx-bell' style="font-size:20px;color:var(--muted)"></i>
          <div class="badge" id="notifBadge">6</div>
        </div>

        <div class="profile" title="Admin profile">
          <img src="{{ url_for('static', filename='img/people.png') }}" alt="SPC Logo">
          <div style="text-align:left">
            <div style="font-weight:700">Bella Hadid</div>
            <div style="font-size:12px;color:var(--muted)">HR • Admin</div>
          </div>
        </div>
      </div>
  </div>

  <!-- Search & Filters -->
  <div class="filters">
    <input type="text" id="searchInput" placeholder="Search by name...">
    <select id="deptFilter">
      <option>All Departments</option>
      <option>Education</option>
      <option>IT</option>
      <option>Business</option>
    </select>
    <select id="statusFilter">
      <option>All Status</option>
      <option>Probationary</option>
      <option>Regular</option>
      <option>Tenured</option>
    </select>
  </div>

  <!-- Employees Table -->
  <div class="card" style="padding:16px;">
    <table class="employee-table">
      <thead>
        <tr>
          <th>Profile</th>
          <th>Department</th>
          <th>Position</th>
          <th>Status</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="employeeTableBody"></tbody>
    </table>
  </div>
</div>


</div>

<script>
const sidebar = document.getElementById('sidebar');
const btnToggle = document.getElementById('btnToggle');
btnToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

// Demo data (added "position")
const employeeData = [
  {name:"Dr. Maria Cruz", dept:"Education", position:"Dean", status:"Regular", email:"mcruz@spc.edu", phone:"0917-123-4567", img:"../img/people.png"},
  {name:"Mr. John Santos", dept:"IT", position:"Faculty", status:"Probationary", email:"jsantos@spc.edu", phone:"0919-987-6543", img:"../img/people.png"},
  {name:"Ms. Ana Reyes", dept:"Business", position:"Faculty", status:"Regular", email:"areyes@spc.edu", phone:"0998-222-3333", img:"../img/people.png"}
];

// Populate table
const tbody = document.getElementById('employeeTableBody');
employeeData.forEach(emp => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="profile-cell"><img src="${emp.img}" alt=""><span>${emp.name}</span></td>
    <td>${emp.dept}</td>
    <td>${emp.position}</td>
    <td><span class="kpi-status ${emp.status.toLowerCase()}">${emp.status}</span></td>
    <td>${emp.email}</td>
    <td>${emp.phone}</td>
    <td><button class="btn-action" onclick="openModal('${emp.name}','${emp.dept}','${emp.position}','${emp.status}','${emp.email}','${emp.phone}','${emp.img}')">View</button></td>
  `;
  tbody.appendChild(tr);
});

</script>

</body>
</html>
