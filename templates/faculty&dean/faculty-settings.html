{% extends "faculty&dean/faculty-base.html" %}

{% block title %}Settings{% endblock %}

{% block page_title %}Settings{% endblock %}

{% block content %}
<div class="faculty-settings">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tablink active" data-tab="personal">Personal Info</button>
    <button class="tablink" data-tab="password">Password</button>
  </div>

  <div class="tab-content" id="personal" style="display:block">
    <form class="grid">
      <div>
        <label>First Name</label>
        <input type="text" value="Juan">
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" value="Santos">
      </div>
      <div>
        <label>Email Address</label>
        <input type="email" value="jsantos@spc.edu.ph">
      </div>
      <div>
        <label>Contact Number</label>
        <input type="text" value="+63 912 345 6789">
      </div>
      <div>
        <label>Profile Picture</label>
        <input type="file">
      </div>
      <div style="grid-column:span 2; text-align:right;">
        <button type="submit" class="btn-primary" onclick="showToast(event)">Save Changes</button>
      </div>
    </form>
  </div>

  <div class="tab-content" id="password">
    <form class="grid">
      <div>
        <label>Current Password</label>
        <input type="password">
      </div>
      <div>
        <label>New Password</label>
        <input type="password">
      </div>
      <div>
        <label>Confirm New Password</label>
        <input type="password">
      </div>
      <div style="grid-column:span 2; text-align:right;">
        <button type="submit" class="btn-primary" onclick="showToast(event)">Update Password</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast">Changes saved successfully!</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Tabs
document.querySelectorAll('.faculty-settings .tablink').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.faculty-settings .tablink').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.faculty-settings .tab-content').forEach(c => c.style.display='none');
    document.getElementById(btn.dataset.tab).style.display='block';
  });
});

// Toast
function showToast(e){
  e.preventDefault();
  const toast = document.getElementById('toast');
  toast.style.display='block';
  setTimeout(()=>{toast.style.display='none';}, 2500);
}
</script>
{% endblock %}
