<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | St. Peter’s College</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/logo.png') }}">
</head>
<body>
  <div class="login-card">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SPC Logo">
    <h2>Password Reset</h2>
    <p class="reset-instructions">
    Provide the email address associated with your account to recover your password.
    </p>
    <form action="{{ url_for('reset_password') }}" method="POST">
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
      </div>
      <button type="submit" class="btn-login">Send Reset Link</button>
    </form>
    <div class="footer">
      <p>Remembered your password? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
  </div>
</body>
</html>
