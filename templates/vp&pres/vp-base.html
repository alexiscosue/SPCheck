<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SPCheck — {% block title %}VP Portal{% endblock %}</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/logo.png') }}">
  
  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SPC Logo">
      <div style="display:flex;flex-direction:column">
        <div class="title">SPCheck</div>
        <div style="font-size:12px;color:var(--muted)">VP Admin Portal</div>
      </div>
    </div>
    <nav class="menu">
      <a href="{{ url_for('vp_promotions') }}" {% if request.endpoint == 'vp_promotions' %}class="active"{% endif %}>
        <i class='bx bx-award'></i><span>Promotions</span>
      </a>
      <a href="{{ url_for('vp_profile') }}" {% if request.endpoint == 'vp_profile' %}class="active"{% endif %}>
        <i class='bx bx-user'></i><span>My Profile</span>
      </a>
      <a href="{{ url_for('vp_settings') }}" {% if request.endpoint == 'vp_settings' %}class="active"{% endif %}>
        <i class='bx bx-cog'></i><span>Settings</span>
      </a>
      <div class="bottom">
        <a href="{{ url_for('logout') }}" style="color:#b91c1c">
          <i class='bx bx-log-out'></i><span>Logout</span>
        </a>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="toggle" id="btnToggle"><i class='bx bx-menu'></i></button>
      <h2 style="margin-left:10px">{% block page_title %}VP Portal{% endblock %}</h2>
      <div class="actions" style="margin-left:auto">
        <div class="notif" title="Notifications" aria-live="polite">
          <i class='bx bx-bell' style="font-size:20px;color:var(--muted)"></i>
          <div class="badge" id="notifBadge">6</div>
        </div>

        <div class="profile" title="VP profile">
          <img src="{{ url_for('static', filename='img/people.png') }}" alt="Profile">
          <div style="text-align:left">
            <div style="font-weight:700">{{ vp_name | default('Peter Punongbayan') }}</div>
            <div style="font-size:12px;color:var(--muted)">VP Admin</div>
          </div>
        </div>
      </div>
    </div>

    {% block content %}{% endblock %}
  </div>

  <!-- Base JavaScript -->
  <script>
    // Sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const btnToggle = document.getElementById('btnToggle');
    btnToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
