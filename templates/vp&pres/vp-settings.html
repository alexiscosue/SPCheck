<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SPCheck — Settings</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/logo.png') }}">

<style>
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="brand">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SPC Logo">
    <div>
      <div class="title">SPCheck</div>
      <div style="font-size:12px;color:#888">VP Admin Portal</div>
    </div>
  </div>
  <nav class="menu">
    <a href="{{ url_for('vp_promotions') }}"><i class='bx bx-award'></i><span>Promotions</span></a>
    <a href="{{ url_for('vp_profile') }}"><i class='bx bx-user'></i><span>My Profile</span></a>
    <a href="{{ url_for('vp_settings') }}" class="active"><i class='bx bx-cog'></i><span>Settings</span></a>
    <div class="bottom">
        <a href="{{ url_for('login') }}" style="color:#b91c1c"><i class='bx bx-log-out'></i><span>Logout</span></a>
    </div>
  </nav>
</aside>

<!-- Main Settings Content -->
<div class="main faculty-settings">
  <div class="topbar">
    <button class="toggle" id="btnToggle"><i class='bx bx-menu'></i></button>
    <h2 style="margin-left:10px">Settings</h2>
    <div class="actions" style="margin-left:auto">
        <div class="notif" title="Notifications" aria-live="polite">
          <i class='bx bx-bell' style="font-size:20px;color:var(--muted)"></i>
          <div class="badge" id="notifBadge">6</div>
        </div>

        <div class="profile" title="Admin profile">
          <img src="{{ url_for('static', filename='img/people.png') }}" alt="SPC Logo">
          <div style="text-align:left">
            <div style="font-weight:700">Diane Ayson</div>
            <div style="font-size:12px;color:var(--muted)">VP Admin</div>
          </div>
        </div>
      </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tablink active" data-tab="personal">Personal Info</button>
    <button class="tablink" data-tab="password">Password</button>
  </div>

  <div class="tab-content" id="personal" style="display:block">
    <form class="grid">
      <div>
        <label>First Name</label>
        <input type="text" value="Juan">
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" value="Santos">
      </div>
      <div>
        <label>Email Address</label>
        <input type="email" value="jsantos@spc.edu.ph">
      </div>
      <div>
        <label>Contact Number</label>
        <input type="text" value="+63 912 345 6789">
      </div>
      <div>
        <label>Profile Picture</label>
        <input type="file">
      </div>
      <div style="grid-column:span 2; text-align:right;">
        <button type="submit" class="btn-primary" onclick="showToast(event)">Save Changes</button>
      </div>
    </form>
  </div>

  <div class="tab-content" id="password">
    <form class="grid">
      <div>
        <label>Current Password</label>
        <input type="password">
      </div>
      <div>
        <label>New Password</label>
        <input type="password">
      </div>
      <div>
        <label>Confirm New Password</label>
        <input type="password">
      </div>
      <div style="grid-column:span 2; text-align:right;">
        <button type="submit" class="btn-primary" onclick="showToast(event)">Update Password</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast">Changes saved successfully!</div>

<script>
// Sidebar toggle
document.getElementById('btnToggle').addEventListener('click', () => {
  document.querySelector('.sidebar').classList.toggle('collapsed');
});

// Tabs
document.querySelectorAll('.faculty-settings .tablink').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.faculty-settings .tablink').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.faculty-settings .tab-content').forEach(c => c.style.display='none');
    document.getElementById(btn.dataset.tab).style.display='block';
  });
});

// Toast
function showToast(e){
  e.preventDefault();
  const toast = document.getElementById('toast');
  toast.style.display='block';
  setTimeout(()=>{toast.style.display='none';}, 2500);
}
</script>

</body>
</html>
